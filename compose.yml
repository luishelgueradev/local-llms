# compose.yml — local-llms platform
# Phase 1: GPU + Compose Foundation
#
# Adds: gpu-preflight (one-shot), ollama (single GPU consumer).
# Future phases append services to this same file (D-12 — no split files).
# Compose `profiles:` per-backend lands in Phase 3 (D-11).
#
# All services use:
#   - pinned image tags (never use the floating "latest" form — INFRA-04)
#   - the x-gpu YAML anchor for GPU reservation (INFRA-02)
#   - the four declared networks (D-13)
#   - depends_on: { gpu-preflight: { condition: service_completed_successfully } }
#     for any GPU consumer (D-04, INFRA-05)

name: ${COMPOSE_PROJECT_NAME:-local-llms}

# ── GPU reservation anchor — referenced by every GPU service ──────────────────
# DO NOT use the legacy "runtime nvidia" Compose directive (on the standing rejection list).
# DO NOT use the "gpus all" shorthand (Compose-version-fragile).
# This block is the canonical form per Docker Compose v2 docs and PITFALLS Pitfall 2.
x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu, utility]
  # `utility` capability is required for nvidia-smi to work INSIDE the container
  # (PITFALLS Pitfall 2). Without it the GPU works but you cannot introspect.

# ── Four networks (D-13) ──────────────────────────────────────────────────────
# Names invented in Phase 1; later phases attach to existing networks, never
# invent new ones. Phase 1 actually wires only `backend` (Ollama is the only
# member); `edge`, `app`, `data` are declared empty so future phases inherit
# the topology without touching this section.
networks:
  edge:
    # Public-facing — Traefik publishes ports here (Phase 6).
  app:
    # Router ↔ webui (Phase 2 attaches router; Phase 6 attaches webui).
  backend:
    internal: true
    # Router ↔ runtimes. internal: true blocks outbound internet from members,
    # which is correct for Ollama, llama.cpp, vLLM (no telemetry, no exfil).
  data:
    internal: true
    # Router/webui ↔ postgres/valkey (Phase 5 attaches Postgres; Phase 8 Valkey).
  webui-app:
    internal: true
    # Phase 6 Plan 05 (D-C6 closure per 06-VERIFICATION.md gaps_found[0] OPTION A):
    # Isolated plane shared ONLY by router + openwebui + traefik. Ollama is NOT a member
    # (preserves Phase 1 D-13 egress-via-app for `ollama pull`). OWUI on [data, webui-app];
    # ollama on [app, backend]; intersection is empty → no TCP route OWUI → ollama:11434.

services:

  # ── GPU preflight (D-04, D-06, INFRA-01) ──────────────────────────────────
  # One-shot service that runs bin/preflight-gpu.sh from inside a pinned NVIDIA
  # CUDA base image. Exits 0 only if all preflight checks pass. Every GPU
  # service `depends_on` it with `condition: service_completed_successfully`,
  # so a failed preflight blocks the entire stack.
  gpu-preflight:
    image: nvidia/cuda:12.6.0-base-ubuntu24.04
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-gpu-preflight
    <<: *gpu
    # Install bash + python3 (the Ubuntu 24.04 base has them, but be defensive).
    # The `bash` is needed because preflight-gpu.sh uses bash-only features.
    # The `python3` is used by preflight-gpu.sh to write the state file as JSON.
    # Both are present in nvidia/cuda:12.6.0-base-ubuntu24.04 — the entrypoint
    # below assumes that. If a future CUDA base drops them, the entrypoint can
    # `apt-get update && apt-get install -y --no-install-recommends bash python3`
    # at the cost of network and time. For Phase 1 we rely on the base image.
    entrypoint: ["/usr/bin/bash"]
    command: ["/preflight/preflight-gpu.sh"]
    volumes:
      # Mount the host-side preflight script read-only.
      - ./bin/preflight-gpu.sh:/preflight/preflight-gpu.sh:ro
      # Mount the host data root so the state file lands at the canonical path
      # (HOST_DATA_ROOT/.preflight-state.json — Phase 7 reads from here).
      - ${HOST_DATA_ROOT:-/srv/local-llms}:${HOST_DATA_ROOT:-/srv/local-llms}
    environment:
      # Tell preflight-gpu.sh where the host data root is from inside the container.
      # The script's `.env`-resolution logic also has a default fallback.
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/srv/local-llms}
    # No restart policy — this is a one-shot. Compose's default is `no` which
    # is what we want.
    restart: "no"
    networks:
      - backend
    # No host port published — preflight only needs GPU + filesystem.

  # ── Ollama (D-11, BCKND-01) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.23.4
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-ollama
    profiles: [ollama]
    <<: *gpu
    restart: unless-stopped
    # GPU init wrapper (libcuda symlink for Docker Desktop / WSL2 — see
    # bin/gpu-init-libcuda.sh for the why). On native Linux with NCT
    # installed, the wrapper detects libcuda is already discoverable and
    # immediately execs the original entrypoint. On WSL2 without NCT, it
    # creates the libcuda.so.1 symlink before exec'ing.
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command: ["/bin/ollama", "serve"]
    # Ollama sits on TWO networks:
    #   - backend: the data plane the router (Phase 2) will use. Stays
    #     `internal: true` so router→ollama is the only inbound path.
    #   - app:     non-internal — gives Ollama egress to registry.ollama.ai
    #              for `ollama pull`. Without this, model pulls fail with
    #              DNS errors (the v1.0 architecture had ollama on backend
    #              only and assumed pulls would work — they don't because
    #              `internal: true` blocks egress). See 01-04 verification.
    # ── Phase 2 D-A4 removed: Ollama host port `127.0.0.1:11434:11434` ────────
    # The router (compose service `router`) is now the only externally-reachable
    # surface (on `127.0.0.1:3000:3000`). Any direct-Ollama probe MUST go through
    # `docker compose exec -T ollama curl http://localhost:11434/...` from the host,
    # which is what bin/smoke-test-gpu.sh and bin/smoke-test-router.sh use.
    # See 02-CONTEXT.md D-A4 + 02-RESEARCH.md Assumption A5 for the rationale.
    networks:
      - backend
      - app
    volumes:
      # Bind-mount Ollama's blob store to the host two-volume layout.
      # /root/.ollama is Ollama's $OLLAMA_MODELS / writable home inside the
      # container. The host side lives under models-gguf/ollama (D-02 layout).
      # This is the half of the two-store split that backs Ollama; future
      # llama.cpp goes to models-gguf/gguf, vLLM to models-hf/.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-gguf/ollama:/root/.ollama
      # Mount the GPU init wrapper read-only at the entrypoint path.
      # Reused by future GPU services (vLLM, llama.cpp) in later phases.
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
      # Mount the host's WSL2 driver directory (where libcuda.so.1.1 lives
      # on Docker Desktop). Read-only. On native Linux this path doesn't
      # exist on the host — Compose silently skips missing bind sources
      # only if the source is a tmpfs/volume; for an absolute host path,
      # it would fail. So we leave this UNMOUNTED in the YAML and rely on
      # Docker Desktop's automatic WSL2 driver projection (the wrapper
      # finds it via /usr/lib/wsl which Docker Desktop already projects).
    environment:
      # Bind to all interfaces inside the container so the backend network can
      # reach it. Default in the official image, but explicit > implicit.
      - OLLAMA_HOST=0.0.0.0:11434
      # Cap concurrent loaded models at 1 (16 GB VRAM constraint per
      # CLAUDE.md). PITFALLS Pitfall 3 — VRAM thrashing prevention.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Cap parallel requests per loaded model. KV cache scales with this;
      # PITFALLS Pitfall 3 + Performance Traps row "OLLAMA_NUM_PARALLEL".
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      # The ollama/ollama image ships no curl, wget, or python — use `ollama list`
      # for the healthcheck (it talks to the local API server internally and is
      # guaranteed to be present; it's the same binary the container is running).
      # Verified in 01-04 verification; the prior `curl …` healthcheck failed with
      # 'curl: executable file not found in $PATH'.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    depends_on:
      # D-04: Compose-native preflight gating. If gpu-preflight exits non-zero,
      # ollama does not start.
      gpu-preflight:
        condition: service_completed_successfully

  # ── llama.cpp-server (Phase 3 — D-A5, BCKND-02) ─────────────────────────────
  # Serves a single GGUF model (Qwen2.5-7B-Instruct-Q4_K_M) with full GPU offload.
  # Joins the `backend` network only — NO host port (T-3-04 mitigation; D-A6).
  # Profile-gated: only active when `--profile llamacpp` is passed.
  # GGUF file must be present at ${HOST_DATA_ROOT}/models-gguf/gguf/ before starting
  # (manual one-time download per README Phase 3 section + Plan 05 smoke test).
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9115   # [VERIFIED 2026-05-12 per 03-RESEARCH §External Pins]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-llamacpp
    profiles: [llamacpp]
    <<: *gpu
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command:
      - "/app/llama-server"
      - "-m"
      - "/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "99"
      - "--ctx-size"
      - "16384"
      - "--parallel"
      - "2"
      - "--metrics"
    networks: [backend]
    volumes:
      # Read-only GGUF mount — D-A8; NEVER mount models-gguf/ollama here (store separation).
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-gguf/gguf:/models:ro
      # GPU init wrapper (same as ollama service — reuses Phase 1 libcuda symlink script).
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
    healthcheck:
      # server-cuda image ships curl (unlike ollama/ollama which uses `ollama list`).
      # Verified per 03-RESEARCH §A6.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 60s    # cold model load can take up to 60s on large GGUFs
      retries: 5
    depends_on:
      gpu-preflight:
        condition: service_completed_successfully

  # ── vLLM (chat, Phase 7 — BCKND-03, D-A1..D-A8) ──────────────────────────────
  # Pinned to v0.21.0-cu129 per 07-CONTEXT.md D-A1 (upgraded from CLAUDE.md's older
  # v0.20.2 pin). Driver 595.97 ≥ 555.x for cu129. Wave 0 smoke (07-00-SUMMARY.md)
  # empirically resolved Pitfall V-1 (sm_120 Blackwell kernel compat): the locked
  # AWQ Marlin path WORKS on RTX 5060 Ti. **OUTCOME: locked** — no fallback ladder
  # triggered (no --quantization=awq drop; no VLLM_USE_TRITON_AWQ=1).
  #
  # Wave 0 also surfaced Pitfall V-2 empirical floor: first-boot cold-start on
  # this host (WSL2 + EXT4) is ~1000-1200s. The 600s in 07-CONTEXT D-A4 is
  # OVERRIDDEN to 1200s here per the Wave 0 directive in 07-00-SUMMARY.md
  # §"Implications for downstream plans" item 2. The 264s torch.compile cost is
  # amortized across cold-starts via the vllm-compile-cache bind-mount (Wave 0
  # directive item 3).
  #
  # Profile-gated `[vllm]` (D-A5) — default `docker compose up -d` does NOT
  # start this; `docker compose --profile vllm up -d vllm vllm-embed` does.
  # Joins `backend` (router data plane) + `app` (HF cache pull egress to
  # huggingface.co). NO host port (D-A6 spirit; router-only surface).
  vllm:
    image: vllm/vllm-openai:v0.21.0-cu129   # [VERIFIED 2026-05-16 — Wave 0 OUTCOME: locked; Pitfall V-1 RESOLVED]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-vllm
    profiles: [vllm]
    <<: *gpu
    restart: unless-stopped
    ipc: host           # D-A4 — required for vLLM's NCCL + shared memory between worker procs
    shm_size: 16gb      # D-A4 — same rationale
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command:
      - "python3"
      - "-m"
      - "vllm.entrypoints.openai.api_server"
      - "--model=Qwen/Qwen2.5-7B-Instruct-AWQ"
      - "--quantization=awq_marlin"            # Wave 0 OUTCOME: locked — Marlin path proven on sm_120 (07-00-SUMMARY.md)
      - "--max-model-len=8192"
      - "--gpu-memory-utilization=0.45"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=hermes"            # CLOSED R-2: hermes is canonical for Qwen2.5-Instruct per docs.vllm.ai
      - "--served-model-name=Qwen/Qwen2.5-7B-Instruct-AWQ"
      - "--host=0.0.0.0"
      - "--port=8000"
    environment:
      # Defensive — Pitfall V-1 fallback B baseline. vLLM auto-selected FA2 in
      # Wave 0 smoke anyway; setting it explicitly is harmless and keeps Plan
      # 07-01 forward-compatible if a future image update changes defaults.
      - VLLM_FLASH_ATTN_VERSION=2
      # HF cache pinning (D-A7) — both env vars point at the same bind-mounted dir
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_CACHE=/root/.cache/huggingface
      # Optional HF token — empty default OK; Qwen2.5-7B-AWQ + bge-m3 are public
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      # HF model cache (Phase 1 D-02 layout pre-created the directory)
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-hf:/root/.cache/huggingface
      # torch.compile AOT cache (Wave 0 directive — amortizes the 264s compile
      # cost across cold-starts; bin/bootstrap-host.sh pre-creates the dir)
      - ${HOST_DATA_ROOT:-/srv/local-llms}/vllm-compile-cache:/root/.cache/vllm
      # GPU init wrapper (libcuda symlink for WSL2 / Docker Desktop — Phase 1
      # pattern shared by ollama + llamacpp services above)
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
    networks:
      - backend         # data plane to router (internal:true blocks egress; HF pull goes via `app`)
      - app             # HF cache pulls from huggingface.co (egress)
    healthcheck:
      # vLLM exposes /health returning 200 when model loaded & ready.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 1200s   # Wave 0 override — empirical cold-start floor on this host
                            # is ~1000-1200s (07-00-SUMMARY.md). DO NOT reduce.
      retries: 10
    depends_on:
      # D-04 pattern — same as ollama / llamacpp: GPU preflight must pass first.
      gpu-preflight:
        condition: service_completed_successfully

  # ── vLLM (embed, Phase 7 — D-B2, D-B5(a)) ────────────────────────────────────
  # Separate vLLM process serving ONLY BAAI/bge-m3. CLOSED R-1: vLLM 0.21.x
  # cannot serve generation + pooling in one process — runner mode is a
  # process-wide choice. So embeddings on vLLM = a second container.
  #
  # Same locked image as the chat service. `--runner=pooling` (the 0.21.x
  # canonical flag — NOT --task) + `--hf-overrides` selecting the
  # BgeM3EmbeddingModel architecture (required for sparse/colbert weight
  # loading per 07-RESEARCH State-of-the-Art row 2).
  #
  # Lower `--gpu-memory-utilization=0.25` keeps embed share at ~4 GB so both
  # vLLM containers can coexist on the 16 GB envelope when the vllm profile
  # is up. bge-m3 has no KV cache so a smaller shm_size suffices.
  #
  # start_period: 300s (NOT 1200s) — bge-m3 is ~2 GB, no torch.compile heavy
  # path, 5 min suffices per 07-RESEARCH §Cold-start budget. Wave 0 only
  # bumped the chat service's budget.
  vllm-embed:
    image: vllm/vllm-openai:v0.21.0-cu129   # same image as vllm: above; pinning consistency
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-vllm-embed
    profiles: [vllm]
    <<: *gpu
    restart: unless-stopped
    ipc: host
    shm_size: 8gb       # smaller than chat — embed has no KV cache
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command:
      - "python3"
      - "-m"
      - "vllm.entrypoints.openai.api_server"
      - "--model=BAAI/bge-m3"
      - "--runner=pooling"                  # CLOSED R-1: --runner pooling, NOT --task
      - "--hf-overrides={\"architectures\":[\"BgeM3EmbeddingModel\"]}"
      - "--gpu-memory-utilization=0.25"
      - "--max-model-len=8192"
      - "--served-model-name=BAAI/bge-m3"
      - "--host=0.0.0.0"
      - "--port=8000"
    environment:
      - VLLM_FLASH_ATTN_VERSION=2
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_CACHE=/root/.cache/huggingface
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-hf:/root/.cache/huggingface
      # Share the same compile cache dir as vllm: — keys differ by model+config
      # so collisions are impossible; sharing reduces operator cognitive load.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/vllm-compile-cache:/root/.cache/vllm
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
    networks:
      - backend
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 300s    # bge-m3 cold-start budget; smaller model, no heavy torch.compile
      retries: 10
    depends_on:
      gpu-preflight:
        condition: service_completed_successfully

  # ── nvidia_gpu_exporter (Phase 7 — OBS-03, D-C1..D-C4) ────────────────────
  # Lightweight Prometheus exporter wrapping `nvidia-smi`. Pin updated from
  # CONTEXT.md D-C1 (1.3.0) → 1.4.1 per 07-RESEARCH Pitfall G-2 (SIGTERM
  # handler fix; clean Compose shutdown).
  #
  # NOT using the x-gpu anchor. The gpu-exporter image is a static Go binary
  # (FROM scratch) and the NVIDIA Container Toolkit projection used by the
  # other GPU services does NOT extend the binary's loader path the same
  # way. Per the canonical INSTALL.md (07-RESEARCH §R-6 Option B), the
  # exporter REQUIRES explicit bind-mounts of nvidia-smi + libnvidia-ml.so.1.
  #
  # WSL2 host bind-mount source paths (Pitfall G-3 + Rule 3 deviation):
  # the canonical /usr/bin/nvidia-smi and /usr/lib/x86_64-linux-gnu/libnvidia-ml.so*
  # paths do NOT exist on this WSL2 host — nvidia-smi + libnvidia-ml.so.1
  # are projected from Windows into /usr/lib/wsl/lib/. We bind those WSL2
  # source paths to the container's standard Linux locations so the exporter
  # finds them at its expected dlopen path. On native-Linux hosts, swap the
  # source side of these binds to /usr/bin/nvidia-smi and
  # /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1 (commented alternatives kept
  # below for portability).
  #
  # Joins `backend` ONLY (D-C2). Prometheus scrapes via Docker DNS at
  # nvidia_gpu_exporter:9835. No host port; no Traefik label.
  nvidia_gpu_exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1   # [VERIFIED 2026-05-16 — Pitfall G-2 SIGTERM fix; pin update over CONTEXT.md D-C1's 1.3.0]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-gpu-exporter
    restart: unless-stopped
    devices:
      # R-6 INSTALL.md canonical device paths — present on both WSL2 + native Linux.
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
    volumes:
      # WSL2 host paths (this host) → container standard Linux paths.
      # `nvidia-smi` is invoked by the exporter via PATH; the container's
      # /usr/bin/nvidia-smi is the documented dlopen-able location.
      - /usr/lib/wsl/lib/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/wsl/lib/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      # Native-Linux alternatives (uncomment and remove the WSL2 entries above
      # when redeploying on a non-WSL2 host) — Pitfall G-3:
      # - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      # - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so:ro
      # - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    networks:
      - backend       # Prometheus scrapes nvidia_gpu_exporter:9835 from `backend`
    healthcheck:
      # The exporter listens on 9835 by default. Image ships busybox-ish
      # tooling; wget is present.
      test: ["CMD-SHELL", "wget -qO- http://localhost:9835/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Prometheus (Phase 7 — OBS-02, D-D1..D-D2) ─────────────────────────────
  # Pin: prom/prometheus:v3.10.0 (CLOSED R-4 — v3 scrape-config schema unchanged
  # from v2; the CONTEXT.md skeleton is canonical-correct). 15s scrape_interval
  # + 15d TSDB retention per D-D2.
  #
  # Scrapes (declared in prometheus/prometheus.yml — file-mounted):
  #   - router:3000           /metrics  (Phase 5 surface; PUBLIC_PATHS skip-list)
  #   - vllm:8000             /metrics  (vLLM native; `up` == 0 until --profile vllm)
  #   - vllm-embed:8000       /metrics  (same; profile-gated)
  #   - llamacpp:8080         /metrics  (Phase 3 --metrics flag)
  #   - nvidia_gpu_exporter:9835 /metrics
  #   - localhost:9090        Prometheus self-scrape
  #
  # Joins `backend` ONLY — internal:true blocks egress, which is correct.
  # Grafana (on app+backend) reaches it by Docker DNS at prometheus:9090.
  # NO host port (D-D6) — operator access is via Grafana panels.
  #
  # Pitfall P-2 — prom runs as UID 65534 (nobody). README documents:
  #   sudo chown -R 65534:65534 ${HOST_DATA_ROOT}/prometheus
  # bin/bootstrap-host.sh pre-creates the directory; the chown is a one-time
  # operator step before first `docker compose up -d prometheus`.
  prometheus:
    image: prom/prometheus:v3.10.0   # [VERIFIED 2026-05-16 — current stable v3 GA; CLOSED R-4]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=:9090"
      - "--web.enable-lifecycle"
    volumes:
      # Declarative scrape config; read-only so an in-container shell cannot
      # mutate it without `docker cp`. The reload endpoint (--web.enable-lifecycle)
      # still works because Prometheus reads the file fresh on POST /-/reload.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # TSDB persistent volume — Phase 1 D-02 layout. UID 65534 ownership
      # is documented above (Pitfall P-2).
      - ${HOST_DATA_ROOT:-/srv/local-llms}/prometheus:/prometheus
    networks:
      - backend       # scrapes router/vllm/llamacpp/gpu-exporter on this plane
    healthcheck:
      # Prometheus exposes /-/ready when it has loaded the WAL and is serving
      # queries. Image is `prom/prometheus` (busybox base — wget is available).
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 5

  # ── Grafana (Phase 7 — OBS-04, D-D3..D-D8) ────────────────────────────────
  # Pin: grafana/grafana-oss:12.4.3 — UPDATED from CONTEXT.md D-D3's stale
  # 11.x suggestion per 07-RESEARCH Pitfall G-1 (11.x is ~14 months old as of
  # 2026-05; provisioning schema is identical 11.x → 12.x → 13.x so no migration
  # work). 12.4.3 is current 12-stable with the better Prometheus 3.x datasource
  # plugin.
  #
  # Auth posture (D-D5):
  #   - GF_AUTH_ANONYMOUS_ENABLED=false   (no anonymous dashboards)
  #   - GF_AUTH_BASIC_ENABLED=true        (Grafana admin user)
  #   - GF_USERS_ALLOW_SIGN_UP=false      (no self-registration)
  #   - admin password from .env via GRAFANA_ADMIN_PASSWORD (Plan 07-01 added)
  # Edge gate at Traefik via webui-basic-auth@docker — REUSE Phase 6 credential
  # per D-D8 (single operator credential surface). Two layers (Traefik basic-auth
  # at edge + Grafana admin user inside) is fine for a single-operator stack.
  #
  # Provisioning (D-D4): datasources/datasource.yml provisions the Prometheus
  # datasource at boot with uid `prometheus-default` (Pitfall P-1 — dashboard JSON
  # in Plan 07-05 references this UID). The dashboards/local-llms.json file is
  # bind-mounted NOW so Plan 07-05 only needs to commit the JSON; Grafana boots
  # cleanly with no dashboard yet (just the datasource), which is expected.
  #
  # Networks (D-D6): `app` (Traefik discovery — Pitfall 12 disambiguation via
  # the docker.network label below) + `backend` (Docker DNS to prometheus:9090).
  # NOT on `edge` (Traefik routes from edge → app for us).
  #
  # Tailscale Serve mapping for svc:grafana is a deferred operator step (third
  # hostname after router + chat from Phase 6). Until then, Grafana reachable
  # via 127.0.0.1:80 + Host: grafana.<tn>.ts.net header per Phase 6 D-A4 LAN
  # bypass pattern (same as router-edge + webui-edge in Plan 06-02 / 06-03).
  grafana:
    image: grafana/grafana-oss:12.4.3   # [VERIFIED 2026-05-16 — Pitfall G-1; pin update over CONTEXT.md D-D3's stale 11.x]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-grafana
    restart: unless-stopped
    environment:
      # D-D5 — admin password from .env (Plan 07-01 added GRAFANA_ADMIN_PASSWORD)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=                # explicitly empty — no third-party plugins
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      # Grafana internal state (provisioned-dashboard clones, internal SQLite/
      # session store, plugin cache). Phase 1 D-02 layout — plain bind, not
      # named volume. bin/bootstrap-host.sh pre-creates the directory.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/grafana:/var/lib/grafana
      # Declarative provisioning — read-only. Source of truth lives in git
      # under grafana/provisioning/. Operator UI edits clone to Grafana's
      # internal DB; reset = `docker compose down -v && up -d`.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON bind-mount — Plan 07-05 fills this file. Declared NOW
      # so Plan 07-05 only commits the JSON; Grafana boots happily with the
      # datasource alive and no dashboard until the JSON lands.
      - ./grafana/provisioning/dashboards/local-llms.json:/etc/grafana/dashboards/local-llms.json:ro
    networks:
      - app          # D-D6 — Traefik discovery; Pitfall 12 disambiguation label below
      - backend      # D-D6 — Docker DNS to prometheus:9090 for queries
    healthcheck:
      # Grafana exposes /api/health returning {"database":"ok","version":"...","commit":"..."}.
      # Image ships wget.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 5
    labels:
      # Same Docker-provider attachment pattern as router-edge + webui-edge
      # (Plan 06-02 / 06-03). Pitfall 12 disambiguation: grafana is on two
      # networks (app + backend); pin Traefik to the `app` plane for HTTP routing.
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-local-llms}_app"
      # D-D7 — Host(`grafana.<tailnet>.ts.net`) on the :80 entrypoint;
      # TLS terminates upstream at Tailscale Serve (Phase 6 D-A2).
      - "traefik.http.routers.grafana-edge.rule=Host(`grafana.${TAILNET_HOSTNAME}.ts.net`)"
      - "traefik.http.routers.grafana-edge.entrypoints=web"
      # D-D8 — REUSE Phase 6 webui-basic-auth credential (declared via Docker
      # label on the traefik: service in Plan 06-01). Single operator credential
      # surface across all three edge hostnames.
      - "traefik.http.routers.grafana-edge.middlewares=webui-basic-auth@docker"
      # Grafana listens on 3000 inside the container (default).
      - "traefik.http.services.grafana-edge.loadbalancer.server.port=3000"
    depends_on:
      # Grafana datasource provisioning queries prometheus:9090 at boot. Boot
      # AFTER prometheus is healthy so the first dashboard load doesn't get a
      # transient connection-refused. required: false keeps Grafana tolerant
      # of restart cycles (Phase 5 / Phase 6 pattern).
      prometheus:
        condition: service_healthy
        required: false

  # ── Router (Phase 2 — D-A1, D-A4, ROUTE-01..ROUTE-08) ──────────────────────
  # The single externally-reachable model surface (localhost-only until Phase 6
  # puts Traefik in front). Joins app + backend; D-13 networks unchanged.
  router:
    build: ./router
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-router
    restart: unless-stopped
    environment:
      - ROUTER_BEARER_TOKEN=${ROUTER_BEARER_TOKEN}
      - MODELS_YAML_PATH=/app/models.yaml   # matches volume mount; explicit > implicit default (IN-03)
      - PORT=3000
      - LOG_LEVEL=info
      - NODE_ENV=production
      # Phase 5 (D-B6): Postgres connection strings. A single POSTGRES_PASSWORD
      # in .env seeds both databases via postgres/initdb/01-init.sql; the router
      # only reads ROUTER_DATABASE_URL. OPENWEBUI_DATABASE_URL is declared here
      # so Phase 6's Open WebUI service inherits the same env contract — its
      # consumer will read it directly from compose at that point.
      - ROUTER_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/router
      - OPENWEBUI_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      # Phase 8 (DATA-06): Valkey connection for rate-limit / circuit-breaker /
      # idempotency / models-cache (Plans 08-04, 08-06, 08-07, 08-09). The URL
      # is hardcoded here (not in .env) because operators don't override the
      # internal data-plane hostname; the password is the single tunable.
      - ROUTER_VALKEY_URL=redis://valkey:6379
      - ROUTER_VALKEY_PASSWORD=${VALKEY_PASSWORD}
      # OLLAMA_URL removed: parsed from env.ts but never consumed — backend URLs
      # are authoritative from models.yaml backend_url fields (03-REVIEW WR-04).
    # ── No host ports (EDGE-03 / Phase 6 D-A4) ───────────────────────────────
    # Phase 6 (06-02): the `ports: ["127.0.0.1:3000:3000"]` line that lived here
    # since Phase 2 D-A4 is REMOVED. External reach is now Tailscale Serve →
    # Traefik (loopback :80) → Docker DNS http://router:3000 on the `app`
    # network. The router-dev: service (profile=dev) keeps its host port for
    # local iteration without Tailscale roundtrip (06-RESEARCH Pattern 6).
    networks:
      - app       # Traefik discovers router-edge here (Pitfall 12 disambiguated via the label below)
      - backend   # talks to ollama (and Phase 3+ runtimes)
      - data      # Phase 5 (D-E1) — talks to postgres on the internal data plane
      - edge      # Phase 6 (06-02 EDGE-02 / Phase 1 D-13 / ROADMAP SC2) — router is the only service on all four
      - webui-app # Phase 6 Plan 05 (D-C6 closure): the network OWUI uses to reach router; ollama not a member.
    volumes:
      # Bind-mount the registry so fs.watch (plan 02-05) sees host edits —
      # RESEARCH Pitfall 7. Named volumes are unreliable for fs.watch across drivers.
      - ./router/models.yaml:/app/models.yaml:ro
    # ── Traefik discovery labels (Phase 6 06-02 — D-B1 attachment, EDGE-01) ──
    # All six labels below are load-bearing. NEVER add a `compress` or
    # `buffering` middleware here — would break SSE streaming on
    # /v1/chat/completions + /v1/messages (PITFALLS Pitfall 4 / EDGE-04).
    labels:
      # Gate: only services with traefik.enable=true are routed (the Docker
      # provider in traefik/traefik.yml runs with exposedByDefault=false).
      - "traefik.enable=true"
      # Pitfall 12 — router is on 4 networks; force Traefik to use `app` for
      # HTTP traffic (backend + data are internal: true and would fail; edge
      # would technically work but app is the canonical service-to-service
      # plane). This LABEL is belt-and-suspenders alongside the static-config
      # providers.docker.network=local-llms_app in traefik/traefik.yml.
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-local-llms}_app"
      # router-edge: Host(`router.<tailnet>.ts.net`) on the :80 entrypoint;
      # TLS terminates upstream at Tailscale Serve (D-A2).
      - "traefik.http.routers.router-edge.rule=Host(`router.${TAILNET_HOSTNAME}.ts.net`)"
      - "traefik.http.routers.router-edge.entrypoints=web"
      # D-B1 attachment — metrics-blackhole rewrites external /metrics paths
      # to /__metrics_blocked__ so the upstream Fastify returns its native 404.
      # The middleware is defined in traefik/dynamic/middlewares.yml (file
      # provider — hence the @file qualifier).
      - "traefik.http.routers.router-edge.middlewares=metrics-blackhole@file"
      # Router listens on 3000 inside the container (env PORT=3000).
      - "traefik.http.services.router-edge.loadbalancer.server.port=3000"
    healthcheck:
      # node:22-bookworm-slim does NOT ship curl; use node -e fetch instead
      # (RESEARCH §Open Question 2). Same rationale as Phase 1's `ollama list`
      # healthcheck (compose.yml lines 146–151).
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5
    depends_on:
      ollama:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — allows router to boot without ollama (Pitfall 2)
      llamacpp:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — allows router to boot without llamacpp
      postgres:
        condition: service_healthy
        required: false      # Phase 5 (D-E4) — router boots without postgres (D-B5)
      valkey:
        condition: service_healthy
        required: false      # Phase 8 (DATA-06) — router boots without valkey; downstream consumers fail-fast per their own policy

  # ─── router-dev (D-A3) ──────────────────────────────────────────────────────
  # Dev-only sibling of `router:` — same networks + healthcheck + env, but
  # builds against the `deps` stage (which has devDeps including tsx) and
  # bind-mounts ./router/src so source edits hot-reload via `tsx watch`.
  # Toggle with: `docker compose --profile dev up router-dev` (NOT `router`).
  # `router:` (the prod build) and `router-dev:` are mutually exclusive in dev.
  router-dev:
    profiles: [dev]
    build:
      context: ./router
      dockerfile: Dockerfile
      target: deps   # stage 1 — has devDeps incl. tsx
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-router-dev
    command: ["npx", "tsx", "watch", "src/index.ts"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - ROUTER_BEARER_TOKEN=${ROUTER_BEARER_TOKEN}
      - MODELS_YAML_PATH=/app/models.yaml
      - PORT=3000
      # Phase 5 (D-B6) — same env contract as `router:` so dev mode is also Phase-5-ready.
      - ROUTER_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/router
      - OPENWEBUI_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      # Phase 8 (DATA-06) — Valkey connection mirrored from router: (same env contract).
      - ROUTER_VALKEY_URL=redis://valkey:6379
      - ROUTER_VALKEY_PASSWORD=${VALKEY_PASSWORD}
    volumes:
      - ./router/src:/app/src:ro
      - ./router/tsconfig.json:/app/tsconfig.json:ro
      - ./router/models.yaml:/app/models.yaml:ro
    networks:
      - app
      - backend
      - data      # Phase 5 (D-E1) — talks to postgres on the internal data plane
    depends_on:
      ollama:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — consistent with router service
      llamacpp:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false      # Phase 5 (D-E4) — router-dev boots without postgres (D-B5)
      valkey:
        condition: service_healthy
        required: false      # Phase 8 (DATA-06) — router-dev boots without valkey (mirrors router:)
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ── Postgres (Phase 5 — D-B3, D-E1..D-E4) ──────────────────────────────────
  # Single instance hosting two logical databases: `router` (used immediately by
  # this phase) and `openwebui` (created empty; populated by Phase 6).
  #
  # Approach A (per 05-01-PLAN Task 1 §action): the official entrypoint creates
  # the `app` role from POSTGRES_PASSWORD and the `router` database from
  # POSTGRES_DB=router. `postgres/initdb/01-init.sql` then creates `openwebui`
  # (also owned by `app`) and installs pgcrypto into `router` (D-B8). No
  # passwords are embedded in the SQL file.
  #
  # Network: `data` only — `internal: true` (Phase 1 D-13). No host port (D-E1).
  # Phase 5 stays loopback-only by design; Phase 6 (Traefik) does not expose
  # postgres externally either.
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-postgres
    restart: unless-stopped
    environment:
      # Approach A: entrypoint creates role `app` + database `router` owned by it.
      # POSTGRES_DB MUST equal `router` so the healthcheck `pg_isready -d router`
      # (D-E2) succeeds on first up, before the initdb script has run.
      - POSTGRES_USER=app
      - POSTGRES_DB=router
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Locale C ensures predictable collation for indexes (no surprises on
      # case-sensitive sorts in btree indexes on text columns).
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    networks:
      - data      # D-E1: internal-only; no edge/app/backend membership
    volumes:
      # Bind mount the data directory under HOST_DATA_ROOT (Phase 1 D-02 layout).
      # Bind-mount (not named volume) keeps backup-portability consistent with
      # Phase 1's discipline. See RESEARCH Pitfall 7 for uid notes; if first-up
      # fails with permission errors, the smoke test slice (Plan 05-04) will
      # document the chown resolution.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/postgres-data:/var/lib/postgresql/data
      # Bind mount the init SQL directory READ-ONLY. The postgres entrypoint
      # runs every *.sql / *.sh in this directory ONCE on first init only
      # (RESEARCH Pitfall 6 — schema evolution lives in Drizzle migrations
      # post-deploy, not here).
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # D-E2 verbatim. `-h 127.0.0.1` forces TCP (vs. local socket) so the
      # probe exercises the same listener the router will use across the
      # `data` network. `-U app -d router` matches the entrypoint-created
      # role + DB so the probe succeeds even before 01-init.sql runs.
      test: ["CMD-SHELL", "pg_isready -U app -d router -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    # No depends_on — postgres has no upstream dependency. No ports — internal
    # network only (D-E1).

  # ── Valkey (Phase 8 — D-D1; DATA-06) ───────────────────────────────────────
  # Single Valkey instance for: rate-limit counters (ROUTE-11 — Plan 08-06),
  # circuit-breaker state (CLOUD-03 — Plan 08-04), idempotency multiplexer
  # (ROUTE-12 — Plan 08-07), and a 30s models.yaml cache (DATA-06 — Plan 08-09).
  #
  # BSD-3 license (vs. Redis 8's tri-license including AGPLv3 — per project
  # STACK.md "What NOT to Use" line + research). API-compatible with Redis 7
  # protocol; the `ioredis` Node client speaks both transparently.
  #
  # Persistence (`--save 60 1`): RDB snapshot every 60 seconds if at least 1
  # key changed. Acceptable for the four use cases — rate-limit counters lose
  # at most 60 s of history on a crash (no big deal at 600 RPM default);
  # idempotency keys with 15-min TTL are still recent enough to be valid;
  # circuit-breaker state recovers on the next failure. AOF is NOT enabled —
  # the writes are too high-frequency (rate-limit INCR per request) to make
  # the durability tradeoff worthwhile.
  #
  # Auth: `--requirepass ${VALKEY_PASSWORD}`. Required because the `data`
  # network is internal-only but defense-in-depth — if the router is ever
  # compromised, the attacker should still need the password to talk to
  # Valkey (vs. the postgres pattern where the password is the same gate).
  #
  # Network: `data` only (internal: true). NO published host ports.
  # Bind mount: ${HOST_DATA_ROOT}/valkey → /data; first-up may need
  # `mkdir -p ${HOST_DATA_ROOT}/valkey && chown 999:1000 ${HOST_DATA_ROOT}/valkey`
  # on the host (Valkey image runs as uid 999 by default — README updates
  # land in Plan 08-10's smoke/docs section).
  valkey:
    image: valkey/valkey:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --loglevel
      - warning
    environment:
      # Re-export VALKEY_PASSWORD inside the container so the healthcheck shell
      # can expand $VALKEY_PASSWORD (escaped as $$ in the YAML to defer
      # Compose interpolation). Compose v2 reads .env into project-level env
      # but the healthcheck shell needs the value INSIDE the container's env.
      - VALKEY_PASSWORD=${VALKEY_PASSWORD}
    networks:
      - data
    volumes:
      - ${HOST_DATA_ROOT:-/srv/local-llms}/valkey:/data
    healthcheck:
      # `$$VALKEY_PASSWORD` — the double-$ tells Compose to pass a literal `$`
      # to the shell, which then expands the in-container VALKEY_PASSWORD env.
      # Mirrors the pg-backup pattern (compose.yml ~line 770).
      test: ["CMD-SHELL", "valkey-cli -a $$VALKEY_PASSWORD ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    # No depends_on — Valkey has no upstream dependency. No ports — internal.

  # ── pg-backup sidecar (Phase 5 — D-F2 path A; DATA-05) ─────────────────────
  # Daily pg_dump in custom format, writing to a bind-mounted host directory.
  # Containerized + portable + pins the pg_dump client version to the server
  # version (same image as `postgres:` above — D-F2 reasoning: pg_dump version
  # must match server version exactly).
  #
  # 7-day retention via `find -mtime +7 -delete` on each loop iteration.
  # Phase 9 (OPS-02) will move backups off-host with a different cadence.
  #
  # Network: `data` only (internal=true — no public exposure). No host ports.
  # Bind mount: ${HOST_DATA_ROOT}/postgres-backups → /backups (the operator
  # may need to `mkdir -p` and possibly `chown 70:70` this path on first up;
  # see README §"Daily backups" + RESEARCH Pitfall 7).
  #
  # depends_on postgres with `required: false` so the sidecar doesn't block
  # router-restart cycles. The `while true` loop's `|| echo "..."` short-circuit
  # logs dump failures (postgres-down at the moment of pg_dump) and continues
  # to the next iteration — exact mirror of D-A7 + RESEARCH Pitfall 4 spirit on
  # the bufferedWriter side.
  pg-backup:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-pg-backup
    restart: unless-stopped
    networks:
      - data
    volumes:
      - ${HOST_DATA_ROOT:-/srv/local-llms}/postgres-backups:/backups
    environment:
      # pg_dump reads PGPASSWORD when -W is not supplied (no interactive prompt).
      - PGPASSWORD=${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    # YAML + Bash escaping note: `$$` in a Compose-string is interpolated to
    # a single `$` BEFORE the shell sees it. So `$$(date ...)` becomes
    # `$(date ...)` in the running shell, and `$$STAMP` becomes `$STAMP`.
    # Verify the rendered command with `docker compose config`.
    command:
      - |
        while true; do
          STAMP=$$(date -u +%Y-%m-%dT%H)
          pg_dump -h postgres -U app -d router --format=custom -f /backups/router-$$STAMP.dump || \
            echo "[pg-backup] dump failed at $$STAMP"
          # 7-day retention — runs every iteration AFTER the dump attempt.
          find /backups -name "router-*.dump" -mtime +7 -delete
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
        required: false      # D-E4 spirit — sidecar tolerates router-restart cycles
    # No healthcheck — sidecar is fire-and-forget; the bind-mounted dumps and
    # `docker compose logs pg-backup` are the verification surface.
    # No ports — internal-only.

  # ── Traefik (Phase 6 — D-A1..D-A6, D-B1..D-B4, D-C4, D-D1) ─────────────────
  # Edge proxy. HTTP-only inside Docker (TLS terminates upstream at Tailscale
  # Serve per D-A2). Publishes ONLY 127.0.0.1:80 + 127.0.0.1:443 (D-A4):
  #   :80  ← Tailscale Serve forwards into this entrypoint (the public path).
  #   :443 ← LAN/ops bypass from the host itself using Traefik's default
  #          self-signed cert (curl -k from the host is fine).
  # Dashboard is fully disabled (D-D1). Static config at traefik/traefik.yml
  # owns the SSE-friendly forwardingTimeouts (EDGE-04). Dynamic config under
  # traefik/dynamic/ defines the `metrics-blackhole@file` middleware (D-B1).
  # The `webui-basic-auth` middleware is declared via the Docker label below
  # (D-C4 — so ${TRAEFIK_BASIC_AUTH} can flow via Compose interpolation).
  traefik:
    image: traefik:v3.7.1   # [VERIFIED 2026-05-16 — current latest v3.7.x patch; NEVER :latest, NEVER :v3.7 floating]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-traefik
    restart: unless-stopped
    # Static config (entrypoints, providers, serversTransport, api, log)
    # lives in traefik/traefik.yml. Note: that file hard-codes the Docker
    # provider network as "local-llms_app" because Traefik doesn't interpolate
    # ${COMPOSE_PROJECT_NAME} in its YAML — see comment in traefik/traefik.yml.
    ports:
      # D-A4 — loopback-only host binds. NOTHING on 0.0.0.0.
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      # Docker socket for the Docker provider — READ-ONLY (security boundary;
      # rw would let Traefik launch arbitrary containers).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static config (entrypoints, providers, forwardingTimeouts).
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Dynamic config directory (file provider; watched live).
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - edge       # public-facing membership (host port publish lives here)
      - app        # to reach router by Docker DNS (router stays on app; Pitfall 12 picks `app` explicitly via providers.docker.network in traefik.yml)
      - webui-app  # Phase 6 Plan 05 (D-C6 closure): to reach openwebui (no longer on `app`); openwebui's traefik.docker.network label points here.
    healthcheck:
      # Traefik exposes /ping only when api is enabled — but api is disabled
      # (D-D1). A bare HTTP probe on :80 returns 404 when no routers are
      # configured yet (e.g. at first boot before 06-02/06-03 wire routers).
      # The `|| exit 0` makes the check tolerant of a 404 response — what we
      # actually want is "is the daemon listening on :80". traefik image has
      # wget, not curl.
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    labels:
      # `traefik.enable=true` is what lets Traefik read its OWN labels via the
      # Docker provider (the provider has exposedByDefault=false).
      - "traefik.enable=true"
      # D-C4 — declare the webui basic-auth middleware as a Docker-provider
      # entity so its value (from .env) can flow via Compose interpolation.
      # ${TRAEFIK_BASIC_AUTH} in .env MUST have $$ doubled — Compose collapses
      # to single $ at interpolation time, matching what Traefik expects.
      # The router service (Plan 06-03) attaches it via `...middlewares=webui-basic-auth@docker`.
      - "traefik.http.middlewares.webui-basic-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"
    depends_on:
      # Traefik routes to these upstreams; start AFTER they're healthy so it
      # doesn't briefly 502 during stack-up. required: false keeps it
      # tolerant of restart cycles.
      router:
        condition: service_healthy
        required: false
      # 06-03 — `openwebui:` is now declared below, so this dep entry is wired
      # (06-01 had to defer it because Compose v5.1.3 rejects depends_on refs to
      # undeclared services at `docker compose config` validation time, even
      # with `required: false` — see 06-01-SUMMARY.md deviation Rule 3).
      openwebui:
        condition: service_healthy
        required: false

  # ── Open WebUI (Phase 6 — D-C1..D-C8, WEBUI-01..WEBUI-05) ──────────────────
  # Pinned to v0.9.0 per CLAUDE.md "What NOT to Use" (NEVER :main, NEVER :latest,
  # NEVER :v0.9 floating — pin exact patch). User chat surface; auto-discovers
  # models from router's GET /v1/models. ALL configuration via env at first boot
  # (D-C1 / 06-RESEARCH §Pattern 5).
  #
  # CRITICAL — WEBUI_AUTH=False is IRREVERSIBLE from boot zero (D-C3 / Pitfall 10).
  # The `openwebui` Postgres DB was created EMPTY in Phase 5 D-B6 (precondition
  # verified); once OWUI's first-boot writes any user/admin row, the env var no
  # longer takes effect. Edge auth lives entirely at Traefik (basic-auth
  # middleware `webui-basic-auth@docker`).
  #
  # CRITICAL — OPENAI_API_BASE_URLS is PLURAL (the v0.9 env-var name) and has
  # NO /v1 suffix — OWUI appends /v1/... itself; doubling would yield /v1/v1/models
  # → 404 → empty model list (Pitfall 5).
  #
  # CRITICAL — networks are [app, data] ONLY. NOT `backend` (anti-pattern: OWUI
  # bypass to GPU runtimes). NOT `edge` (Traefik reaches OWUI via the `app`
  # network — the `traefik.docker.network` label below disambiguates per
  # Pitfall 12, matching 06-02's pattern on the router service).
  #
  # CRITICAL — zero host port mappings (EDGE-03). All access via Traefik on
  # the `chat.<TAILNET_HOSTNAME>.ts.net` Tailscale Serve hostname.
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.9.0   # [VERIFIED 2026-05-16 — pinned patch; NEVER :latest, NEVER :main per CLAUDE.md]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-openwebui
    restart: unless-stopped
    environment:
      # ── Auth posture (PersistentConfig — irreversible after first boot) ────
      - WEBUI_AUTH=False                            # D-C3 — IRREVERSIBLE; requires empty openwebui DB at first boot (Phase 5 D-B6 verified)
      - ENABLE_SIGNUP=False                         # belt-and-suspenders; moot under WEBUI_AUTH=False (06-RESEARCH §Pattern 5)
      # ── Connector to the router (sole provider) ───────────────────────────
      # PLURAL env-var names — OWUI 0.9 canonical form (Pitfall 5/6).
      # NO /v1 suffix — OWUI appends /v1/... itself; doubling → /v1/v1/models 404.
      - OPENAI_API_BASE_URLS=http://router:3000     # D-C2 — single-provider; if multi were needed the separator is `;` (Pitfall 6)
      - OPENAI_API_KEYS=${ROUTER_BEARER_TOKEN}      # D-C1 — bearer flows to router via OWUI's OpenAI connector
      - ENABLE_OPENAI_API=True                      # default; explicit for clarity (Pattern 5)
      - ENABLE_OLLAMA_API=False                     # D-C6 / Pitfall 8 — prevents OWUI from auto-detecting the Ollama peer on the app network (defense-in-depth)
      # ── Persistence ────────────────────────────────────────────────────────
      # D-C5 / WEBUI-04 — shared Postgres `openwebui` DB (created empty in Phase 5 D-B6 by postgres/initdb/01-init.sql).
      # Phase 5 declared `OPENWEBUI_DATABASE_URL` as a SERVICE-level env on the router (compose.yml lines 226-227) — NOT a top-level
      # `.env` variable. So `${OPENWEBUI_DATABASE_URL}` would interpolate to empty here; we materialize the same connection string
      # inline from `${POSTGRES_PASSWORD}` (operator-provided in .env, present since Phase 1 D-14). Same shape Phase 5 used.
      - DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      - WEBUI_SECRET_KEY=${OWUI_SECRET_KEY}         # Pitfall 10 — pinned so DB backups round-trip across container recreates; auto-generation would rotate the key
      # ── Cosmetic / OAuth-ready ─────────────────────────────────────────────
      - WEBUI_NAME=local-llms                       # UI-SPEC.md §Branding Hooks
      - WEBUI_URL=https://chat.${TAILNET_HOSTNAME}.ts.net   # OAuth callback target (deferred to Phase 9; declared now for future readiness)
    volumes:
      # D-C8 / Phase 1 D-02 layout — plain bind, NOT a named volume.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/openwebui:/app/backend/data
    networks:
      - webui-app  # Phase 6 Plan 05 (D-C6 closure): replaces `app` — OWUI no longer shares a network with ollama; D-C6 satisfied at the TCP plane.
      - data       # talks to postgres on the internal data plane (openwebui DB created Phase 5 D-B6)
    healthcheck:
      # OWUI exposes GET /health publicly (no auth) returning {"status":"OK"}.
      # Image ships curl. Listens on 8080 inside the container (default).
      # [VERIFIED: docs.openwebui.com/reference/monitoring/]
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 30s    # OWUI 0.9 cold-boot can take 15-25s on first DB init (06-RESEARCH §Pattern 5)
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
        required: false      # D-E4 spirit — tolerates restart cycles (Phase 5 pattern)
      router:
        condition: service_healthy
        required: false      # OWUI can boot even if router lags briefly; auto-discovery retries on internal cadence
    # ── Traefik discovery labels (D-C4 attachment; 6 total, ordered for diffability) ──
    # NEVER add `compress` or `buffering` middleware here — would break SSE on
    # any future streaming route OWUI proxies (EDGE-04 / Pitfall 4).
    # NEVER add `ports:` — zero host port mappings (EDGE-03).
    labels:
      # Gate: only services with traefik.enable=true are routed (Docker provider
      # in traefik/traefik.yml runs with exposedByDefault=false).
      - "traefik.enable=true"
      # Pitfall 12 — openwebui is on 2 networks (webui-app + data); force Traefik
      # to use `webui-app` for HTTP traffic — OWUI is no longer on `app` after
      # Plan 06-05's D-C6 closure (06-VERIFICATION.md gaps_found[0] OPTION A).
      # `data` is internal:true and would fail anyway. Traefik joins `webui-app`
      # in this plan to keep webui-edge discovery alive on the new shared plane.
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-local-llms}_webui-app"
      # webui-edge: Host(`chat.<tailnet>.ts.net`) on the :80 entrypoint;
      # TLS terminates upstream at Tailscale Serve (D-A2).
      - "traefik.http.routers.webui-edge.rule=Host(`chat.${TAILNET_HOSTNAME}.ts.net`)"
      - "traefik.http.routers.webui-edge.entrypoints=web"
      # D-C4 attachment — webui-basic-auth middleware was declared via Docker
      # label on the `traefik:` service itself in Plan 06-01 (so ${TRAEFIK_BASIC_AUTH}
      # could flow via Compose interpolation; file-provider YAML cannot consume
      # Compose env vars). The `@docker` qualifier targets the Docker provider's
      # registry where that label lives.
      - "traefik.http.routers.webui-edge.middlewares=webui-basic-auth@docker"
      # OWUI listens on 8080 inside the container (default; no PORT env override).
      - "traefik.http.services.webui-edge.loadbalancer.server.port=8080"
