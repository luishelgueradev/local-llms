# compose.yml — local-llms platform
# Phase 1: GPU + Compose Foundation
#
# Adds: gpu-preflight (one-shot), ollama (single GPU consumer).
# Future phases append services to this same file (D-12 — no split files).
# Compose `profiles:` per-backend lands in Phase 3 (D-11).
#
# All services use:
#   - pinned image tags (never use the floating "latest" form — INFRA-04)
#   - the x-gpu YAML anchor for GPU reservation (INFRA-02)
#   - the four declared networks (D-13)
#   - depends_on: { gpu-preflight: { condition: service_completed_successfully } }
#     for any GPU consumer (D-04, INFRA-05)

name: ${COMPOSE_PROJECT_NAME:-local-llms}

# ── GPU reservation anchor — referenced by every GPU service ──────────────────
# DO NOT use the legacy "runtime nvidia" Compose directive (on the standing rejection list).
# DO NOT use the "gpus all" shorthand (Compose-version-fragile).
# This block is the canonical form per Docker Compose v2 docs and PITFALLS Pitfall 2.
x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu, utility]
  # `utility` capability is required for nvidia-smi to work INSIDE the container
  # (PITFALLS Pitfall 2). Without it the GPU works but you cannot introspect.

# ── Four networks (D-13) ──────────────────────────────────────────────────────
# Names invented in Phase 1; later phases attach to existing networks, never
# invent new ones. Phase 1 actually wires only `backend` (Ollama is the only
# member); `edge`, `app`, `data` are declared empty so future phases inherit
# the topology without touching this section.
networks:
  edge:
    # Public-facing — Traefik publishes ports here (Phase 6).
  app:
    # Router ↔ webui (Phase 2 attaches router; Phase 6 attaches webui).
  backend:
    internal: true
    # Router ↔ runtimes. internal: true blocks outbound internet from members,
    # which is correct for Ollama, llama.cpp, vLLM (no telemetry, no exfil).
  data:
    internal: true
    # Router/webui ↔ postgres/valkey (Phase 5 attaches Postgres; Phase 8 Valkey).

services:

  # ── GPU preflight (D-04, D-06, INFRA-01) ──────────────────────────────────
  # One-shot service that runs bin/preflight-gpu.sh from inside a pinned NVIDIA
  # CUDA base image. Exits 0 only if all preflight checks pass. Every GPU
  # service `depends_on` it with `condition: service_completed_successfully`,
  # so a failed preflight blocks the entire stack.
  gpu-preflight:
    image: nvidia/cuda:12.6.0-base-ubuntu24.04
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-gpu-preflight
    <<: *gpu
    # Install bash + python3 (the Ubuntu 24.04 base has them, but be defensive).
    # The `bash` is needed because preflight-gpu.sh uses bash-only features.
    # The `python3` is used by preflight-gpu.sh to write the state file as JSON.
    # Both are present in nvidia/cuda:12.6.0-base-ubuntu24.04 — the entrypoint
    # below assumes that. If a future CUDA base drops them, the entrypoint can
    # `apt-get update && apt-get install -y --no-install-recommends bash python3`
    # at the cost of network and time. For Phase 1 we rely on the base image.
    entrypoint: ["/usr/bin/bash"]
    command: ["/preflight/preflight-gpu.sh"]
    volumes:
      # Mount the host-side preflight script read-only.
      - ./bin/preflight-gpu.sh:/preflight/preflight-gpu.sh:ro
      # Mount the host data root so the state file lands at the canonical path
      # (HOST_DATA_ROOT/.preflight-state.json — Phase 7 reads from here).
      - ${HOST_DATA_ROOT:-/srv/local-llms}:${HOST_DATA_ROOT:-/srv/local-llms}
    environment:
      # Tell preflight-gpu.sh where the host data root is from inside the container.
      # The script's `.env`-resolution logic also has a default fallback.
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/srv/local-llms}
    # No restart policy — this is a one-shot. Compose's default is `no` which
    # is what we want.
    restart: "no"
    networks:
      - backend
    # No host port published — preflight only needs GPU + filesystem.

  # ── Ollama (D-11, BCKND-01) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.23.4
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-ollama
    profiles: [ollama]
    <<: *gpu
    restart: unless-stopped
    # GPU init wrapper (libcuda symlink for Docker Desktop / WSL2 — see
    # bin/gpu-init-libcuda.sh for the why). On native Linux with NCT
    # installed, the wrapper detects libcuda is already discoverable and
    # immediately execs the original entrypoint. On WSL2 without NCT, it
    # creates the libcuda.so.1 symlink before exec'ing.
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command: ["/bin/ollama", "serve"]
    # Ollama sits on TWO networks:
    #   - backend: the data plane the router (Phase 2) will use. Stays
    #     `internal: true` so router→ollama is the only inbound path.
    #   - app:     non-internal — gives Ollama egress to registry.ollama.ai
    #              for `ollama pull`. Without this, model pulls fail with
    #              DNS errors (the v1.0 architecture had ollama on backend
    #              only and assumed pulls would work — they don't because
    #              `internal: true` blocks egress). See 01-04 verification.
    # ── Phase 2 D-A4 removed: Ollama host port `127.0.0.1:11434:11434` ────────
    # The router (compose service `router`) is now the only externally-reachable
    # surface (on `127.0.0.1:3000:3000`). Any direct-Ollama probe MUST go through
    # `docker compose exec -T ollama curl http://localhost:11434/...` from the host,
    # which is what bin/smoke-test-gpu.sh and bin/smoke-test-router.sh use.
    # See 02-CONTEXT.md D-A4 + 02-RESEARCH.md Assumption A5 for the rationale.
    networks:
      - backend
      - app
    volumes:
      # Bind-mount Ollama's blob store to the host two-volume layout.
      # /root/.ollama is Ollama's $OLLAMA_MODELS / writable home inside the
      # container. The host side lives under models-gguf/ollama (D-02 layout).
      # This is the half of the two-store split that backs Ollama; future
      # llama.cpp goes to models-gguf/gguf, vLLM to models-hf/.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-gguf/ollama:/root/.ollama
      # Mount the GPU init wrapper read-only at the entrypoint path.
      # Reused by future GPU services (vLLM, llama.cpp) in later phases.
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
      # Mount the host's WSL2 driver directory (where libcuda.so.1.1 lives
      # on Docker Desktop). Read-only. On native Linux this path doesn't
      # exist on the host — Compose silently skips missing bind sources
      # only if the source is a tmpfs/volume; for an absolute host path,
      # it would fail. So we leave this UNMOUNTED in the YAML and rely on
      # Docker Desktop's automatic WSL2 driver projection (the wrapper
      # finds it via /usr/lib/wsl which Docker Desktop already projects).
    environment:
      # Bind to all interfaces inside the container so the backend network can
      # reach it. Default in the official image, but explicit > implicit.
      - OLLAMA_HOST=0.0.0.0:11434
      # Cap concurrent loaded models at 1 (16 GB VRAM constraint per
      # CLAUDE.md). PITFALLS Pitfall 3 — VRAM thrashing prevention.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Cap parallel requests per loaded model. KV cache scales with this;
      # PITFALLS Pitfall 3 + Performance Traps row "OLLAMA_NUM_PARALLEL".
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      # The ollama/ollama image is Alpine-style minimal — NO curl, NO
      # wget, NO python. Use `ollama list` instead: it talks to the local
      # API server (same /api/tags endpoint internally) and is guaranteed to
      # be present (it's the same binary the container is running). Verified
      # in 01-04 verification; the prior `curl …` healthcheck failed with
      # 'curl: executable file not found in $PATH'.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    depends_on:
      # D-04: Compose-native preflight gating. If gpu-preflight exits non-zero,
      # ollama does not start.
      gpu-preflight:
        condition: service_completed_successfully

  # ── llama.cpp-server (Phase 3 — D-A5, BCKND-02) ─────────────────────────────
  # Serves a single GGUF model (Qwen2.5-7B-Instruct-Q4_K_M) with full GPU offload.
  # Joins the `backend` network only — NO host port (T-3-04 mitigation; D-A6).
  # Profile-gated: only active when `--profile llamacpp` is passed.
  # GGUF file must be present at ${HOST_DATA_ROOT}/models-gguf/gguf/ before starting
  # (manual one-time download per README Phase 3 section + Plan 05 smoke test).
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9115   # [VERIFIED 2026-05-12 per 03-RESEARCH §External Pins]
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-llamacpp
    profiles: [llamacpp]
    <<: *gpu
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/gpu-init-libcuda.sh"]
    command:
      - "/app/llama-server"
      - "-m"
      - "/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "99"
      - "--ctx-size"
      - "16384"
      - "--parallel"
      - "2"
      - "--metrics"
    networks: [backend]
    volumes:
      # Read-only GGUF mount — D-A8; NEVER mount models-gguf/ollama here (store separation).
      - ${HOST_DATA_ROOT:-/srv/local-llms}/models-gguf/gguf:/models:ro
      # GPU init wrapper (same as ollama service — reuses Phase 1 libcuda symlink script).
      - ./bin/gpu-init-libcuda.sh:/usr/local/bin/gpu-init-libcuda.sh:ro
    healthcheck:
      # server-cuda image ships curl (unlike ollama/ollama which uses `ollama list`).
      # Verified per 03-RESEARCH §A6.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 60s    # cold model load can take up to 60s on large GGUFs
      retries: 5
    depends_on:
      gpu-preflight:
        condition: service_completed_successfully

  # ── Router (Phase 2 — D-A1, D-A4, ROUTE-01..ROUTE-08) ──────────────────────
  # The single externally-reachable model surface (localhost-only until Phase 6
  # puts Traefik in front). Joins app + backend; D-13 networks unchanged.
  router:
    build: ./router
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-router
    restart: unless-stopped
    environment:
      - ROUTER_BEARER_TOKEN=${ROUTER_BEARER_TOKEN}
      - OLLAMA_URL=http://ollama:11434/v1
      - PORT=3000
      - LOG_LEVEL=info
      - NODE_ENV=production
      # Phase 5 (D-B6): Postgres connection strings. A single POSTGRES_PASSWORD
      # in .env seeds both databases via postgres/initdb/01-init.sql; the router
      # only reads ROUTER_DATABASE_URL. OPENWEBUI_DATABASE_URL is declared here
      # so Phase 6's Open WebUI service inherits the same env contract — its
      # consumer will read it directly from compose at that point.
      - ROUTER_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/router
      - OPENWEBUI_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/openwebui
    ports:
      # localhost-only — D-A4. Phase 6 (Traefik) removes this.
      - "127.0.0.1:3000:3000"
    networks:
      - app       # later: webui (Phase 6)
      - backend   # talks to ollama (and Phase 3+ runtimes)
      - data      # Phase 5 (D-E1) — talks to postgres on the internal data plane
    volumes:
      # Bind-mount the registry so fs.watch (plan 02-05) sees host edits —
      # RESEARCH Pitfall 7. Named volumes are unreliable for fs.watch across drivers.
      - ./router/models.yaml:/app/models.yaml:ro
    healthcheck:
      # node:22-bookworm-slim does NOT ship curl; use node -e fetch instead
      # (RESEARCH §Open Question 2). Same rationale as Phase 1's `ollama list`
      # healthcheck (compose.yml lines 146–151).
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5
    depends_on:
      ollama:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — allows router to boot without ollama (Pitfall 2)
      llamacpp:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — allows router to boot without llamacpp
      postgres:
        condition: service_healthy
        required: false      # Phase 5 (D-E4) — router boots without postgres (D-B5)

  # ─── router-dev (D-A3) ──────────────────────────────────────────────────────
  # Dev-only sibling of `router:` — same networks + healthcheck + env, but
  # builds against the `deps` stage (which has devDeps including tsx) and
  # bind-mounts ./router/src so source edits hot-reload via `tsx watch`.
  # Toggle with: `docker compose --profile dev up router-dev` (NOT `router`).
  # `router:` (the prod build) and `router-dev:` are mutually exclusive in dev.
  router-dev:
    profiles: [dev]
    build:
      context: ./router
      dockerfile: Dockerfile
      target: deps   # stage 1 — has devDeps incl. tsx
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-router-dev
    command: ["npx", "tsx", "watch", "src/index.ts"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - ROUTER_BEARER_TOKEN=${ROUTER_BEARER_TOKEN}
      - MODELS_YAML_PATH=/app/models.yaml
      - PORT=3000
      # Phase 5 (D-B6) — same env contract as `router:` so dev mode is also Phase-5-ready.
      - ROUTER_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/router
      - OPENWEBUI_DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/openwebui
    volumes:
      - ./router/src:/app/src:ro
      - ./router/tsconfig.json:/app/tsconfig.json:ro
      - ./router/models.yaml:/app/models.yaml:ro
    networks:
      - app
      - backend
      - data      # Phase 5 (D-E1) — talks to postgres on the internal data plane
    depends_on:
      ollama:
        condition: service_healthy
        required: false      # Compose >= 2.20.2 — consistent with router service
      llamacpp:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false      # Phase 5 (D-E4) — router-dev boots without postgres (D-B5)
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ── Postgres (Phase 5 — D-B3, D-E1..D-E4) ──────────────────────────────────
  # Single instance hosting two logical databases: `router` (used immediately by
  # this phase) and `openwebui` (created empty; populated by Phase 6).
  #
  # Approach A (per 05-01-PLAN Task 1 §action): the official entrypoint creates
  # the `app` role from POSTGRES_PASSWORD and the `router` database from
  # POSTGRES_DB=router. `postgres/initdb/01-init.sql` then creates `openwebui`
  # (also owned by `app`) and installs pgcrypto into `router` (D-B8). No
  # passwords are embedded in the SQL file.
  #
  # Network: `data` only — `internal: true` (Phase 1 D-13). No host port (D-E1).
  # Phase 5 stays loopback-only by design; Phase 6 (Traefik) does not expose
  # postgres externally either.
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-local-llms}-postgres
    restart: unless-stopped
    environment:
      # Approach A: entrypoint creates role `app` + database `router` owned by it.
      # POSTGRES_DB MUST equal `router` so the healthcheck `pg_isready -d router`
      # (D-E2) succeeds on first up, before the initdb script has run.
      - POSTGRES_USER=app
      - POSTGRES_DB=router
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Locale C ensures predictable collation for indexes (no surprises on
      # case-sensitive sorts in btree indexes on text columns).
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    networks:
      - data      # D-E1: internal-only; no edge/app/backend membership
    volumes:
      # Bind mount the data directory under HOST_DATA_ROOT (Phase 1 D-02 layout).
      # Bind-mount (not named volume) keeps backup-portability consistent with
      # Phase 1's discipline. See RESEARCH Pitfall 7 for uid notes; if first-up
      # fails with permission errors, the smoke test slice (Plan 05-04) will
      # document the chown resolution.
      - ${HOST_DATA_ROOT:-/srv/local-llms}/postgres-data:/var/lib/postgresql/data
      # Bind mount the init SQL directory READ-ONLY. The postgres entrypoint
      # runs every *.sql / *.sh in this directory ONCE on first init only
      # (RESEARCH Pitfall 6 — schema evolution lives in Drizzle migrations
      # post-deploy, not here).
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # D-E2 verbatim. `-h 127.0.0.1` forces TCP (vs. local socket) so the
      # probe exercises the same listener the router will use across the
      # `data` network. `-U app -d router` matches the entrypoint-created
      # role + DB so the probe succeeds even before 01-init.sql runs.
      test: ["CMD-SHELL", "pg_isready -U app -d router -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    # No depends_on — postgres has no upstream dependency. No ports — internal
    # network only (D-E1).
