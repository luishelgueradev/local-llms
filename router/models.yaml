# ─────────────────────────────────────────────────────────────────────────────
# POLICY PRIMITIVES (Phase 14 — v0.11.0 — POL-01 / POL-02)
# ─────────────────────────────────────────────────────────────────────────────
#
# Two policy controls are available via a top-level `policies:` section and a
# per-entry `policy:` block.  Both default to ALLOW ALL — an absent or empty
# `policies:` section, and absent `policy:` on any model entry, produce
# identical behavior to the pre-v0.11.0 stack (D-04).
#
# GATE POSITION (D-09 / P8-01 — non-negotiable):
#   bearer auth → body validation → capability check
#     → [ POLICY GATE ] ← fires here, BEFORE circuit-breaker check
#     → circuit breaker → upstream backend
#   Policy violations (403) are NOT counted as backend failures.
#
# ── 1. Global model allowlist ─────────────────────────────────────────────────
# Declares which model names are routable.  Empty list (the default) = allow all.
# Requests for a model NOT in this list return:
#   HTTP 403  { "error": { "code": "model_not_in_allowlist", "model": "...",
#                          "type": "policy_violation" } }
# (same envelope shape on /v1/chat/completions AND /v1/messages)
#
# Uncomment and populate to restrict which models callers may use:
# policies:
#   default:
#     model_allowlist:
#       - chat-local
#       - vision-local
#
# ── 2. Per-entry cloud routing deny ───────────────────────────────────────────
# Setting `policy.cloud_allowed: false` on a registry entry prevents the router
# from dispatching that model to an `ollama-cloud` backend.
# Default: `true` (or absent) — cloud dispatch is allowed.
# Violation response:
#   HTTP 403  { "error": { "code": "cloud_not_allowed", "model": "...",
#                          "type": "policy_violation" } }
#
# Example (inside a model entry — all lines still `#`-prefixed here):
#   - name: big-cloud
#     backend: ollama-cloud
#     ...
#     # policy:
#     #   cloud_allowed: false    # uncomment to deny cloud for this entry
#
# ── HOT-RELOAD CAVEAT ─────────────────────────────────────────────────────────
# Editing this file requires TWO steps to take effect immediately (project
# memory: project_models_yaml_hot_edit.md):
#
#   Step 1 — invalidate the Valkey model-registry snapshot:
#     VALKEY_PASSWORD=$(grep '^VALKEY_PASSWORD=' .env | cut -d= -f2-)
#     # valkey-cli DEL pattern (with auth): valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning DEL 'model-registry:*'
#     docker compose exec -T valkey valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning DEL 'model-registry:*'
#
#   Step 2 — force-recreate the router (NOT restart — restart does NOT re-read):
#     docker compose up -d --force-recreate router
#
# A bare `docker compose restart router` will NOT pick up policy changes because
# the cached snapshot lives in Valkey and is served from memory on warm boot.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# EXTERNAL MCP SERVERS (Phase 18 — v0.11.0 — MCPC-01)
# ─────────────────────────────────────────────────────────────────────────────
#
# Declare external MCP servers the router can consume as tool-providers.
# Each alias is a UNIQUE key (regex /^[a-z0-9_]{1,32}$/) referenced by per-model
# `mcp_servers_enabled:`. The router connects LAZILY on first use (MCPC-02 /
# P2-01 BLOCK) — boot never blocks on external availability. `tools/list` is
# cached in Valkey for 60s under `mcp:tools:{alias}` (MCPC-06).
#
# Hot-reload: editing this block requires the SAME Valkey-DEL + force-recreate
# dance documented under POLICY PRIMITIVES above (project memory
# project_models_yaml_hot_edit.md):
#
#   docker compose exec -T valkey valkey-cli -a "$VALKEY_PASSWORD" \
#     --no-auth-warning DEL 'mcp:tools:*'
#   docker compose up -d --force-recreate router
#
# Auth model (v0.11.0 LOCK):
#   - auth_type: none   → no auth header sent
#   - auth_type: bearer → Authorization: Bearer <auth_value> on every request
#                          auth_value is a LITERAL STRING; env-var interpolation
#                          is Open Question #9 (FUT).
#
# Transport: 'streamable-http' is the v0.11.0 lock — no stdio, no legacy SSE-only.
#
# tool_filter: ['*'] (default) means "all tools allowed"; explicit list = allowlist.
#
# Frame-01 invariant: production ships with NO mcp_servers declared. Operators
# OPT IN by uncommenting + populating the block below. The block is REJECTED if
# any per-model `mcp_servers_enabled` references an alias not declared here.
#
# Example (all lines `#`-prefixed — uncomment to enable):
# mcp_servers:
#   - alias: qdrant_retrieval              # MUST match /^[a-z0-9_]{1,32}$/
#     url: https://qdrant-mcp.internal/mcp # absolute https URL of external /mcp endpoint
#     transport: streamable-http           # v0.11.0 lock
#     auth_type: bearer                    # 'none' | 'bearer'
#     auth_value: '<token-string>'         # required when auth_type='bearer'
#     timeout_ms: 10000                    # optional; default 10_000
#     tool_filter: ['*']                   # optional; default ['*']
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# CONTEXT WINDOW (Phase 17 — v0.11.0 — CTXP-04)
# ─────────────────────────────────────────────────────────────────────────────
#
# Two optional fields on each model entry tune the ContextProvider that ships
# with v0.11.0. When `X-Session-ID` is present on a request, the router loads
# the session's history and uses these fields to trim the message array so it
# fits the upstream model's context window.
#
#   ctx_size         integer (default 8192)
#                    The model's context window in tokens. Token counting uses
#                    gpt-tokenizer/cl100k_base which over-estimates qwen/llama
#                    vocabularies by ~10-20% — that's a deliberate safety margin.
#
#   context_strategy enum: "truncate" | "sliding-window"   (default sliding-window)
#                    truncate       — drop oldest non-system turns, hard turn cap.
#                    sliding-window — drop oldest non-system turns until tokens fit.
#                    System messages are NEVER evictable by either strategy
#                    (CTXP-03 BLOCK — preservation is a binding invariant).
#
# Sessions are opt-in: requests without X-Session-ID are stateless and these
# fields are unused. Default values preserve pre-Phase-17 behavior on every
# existing entry — no migration is required to keep existing routes working.
#
# Example:
#   - name: chat-local
#     ...
#     ctx_size: 8192
#     context_strategy: sliding-window     # default — can be omitted
#
#   - name: gpt-oss:120b-cloud
#     ...
#     ctx_size: 65536                      # cloud model has a larger window
#     context_strategy: sliding-window
# ─────────────────────────────────────────────────────────────────────────────

backends:
  ollama:
    # base_url: documentation only — NOT used at runtime (see registry.ts BackendsSection comment).
    # Effective backend URL per model is each entry's backend_url field below.
    base_url: http://ollama:11434/v1
    concurrency: 2
    queue_max_wait_ms: 30000
  llamacpp:
    # base_url: documentation only — NOT used at runtime (see registry.ts BackendsSection comment).
    base_url: http://llamacpp:8080/v1
    concurrency: 2
    queue_max_wait_ms: 30000
  vllm:
    # base_url: documentation only — NOT used at runtime (see registry.ts BackendsSection comment).
    # Phase 7 (Plan 07-03): vLLM chat container exposes OpenAI-compat at :8000/v1.
    base_url: http://vllm:8000/v1
    concurrency: 2
    queue_max_wait_ms: 30000
  vllm-embed:
    # base_url: documentation only — NOT used at runtime (see registry.ts BackendsSection comment).
    # Phase 7 (Plan 07-03): separate vLLM container running --task embed; cheaper than
    # chat so higher concurrency is acceptable.
    base_url: http://vllm-embed:8000/v1
    concurrency: 4
    queue_max_wait_ms: 30000
  ollama-cloud:
    # base_url: documentation only — NOT used at runtime (see registry.ts BackendsSection comment).
    # Phase 8 (Plan 08-02 — CLOUD-01): Ollama Cloud OpenAI-compat surface. Concurrency
    # backstop only — cloud's own rate-limit + weekly quota are the real cap. Plan 08-06
    # adds the per-agent rate-limit; Plan 08-07 adds idempotency; Plan 08-04 adds the
    # breaker that opens on cloud 5xx/timeout streaks.
    base_url: https://ollama.com/v1
    concurrency: 4
    queue_max_wait_ms: 30000

models:
  - name: llama3.2:3b-instruct-q4_K_M
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: llama3.2:3b-instruct-q4_K_M
    capabilities: [chat]
    vram_budget_gb: 4
    concurrency: 2
    max_model_len: 8192
    profile: ollama
    recommended_for: [chat]    # Phase 20 / CDX-01 — small chat-only model; no tools/json_mode/vision

  - name: qwen2.5-7b-instruct-q4km
    backend: llamacpp
    backend_url: http://llamacpp:8080/v1
    backend_model: qwen2.5-7b-instruct-q4_K_M
    capabilities: [chat, tools, json_mode]
    vram_budget_gb: 6
    concurrency: 2
    max_model_len: 8192
    profile: llamacpp
    disabled: true  # Phase 20 / CAT-01 / D-01 — backend not running on this host (project_vram_budget: vllm/llamacpp redundantes). Flip to false + start backend to re-enable.

  - name: llama3.2-vision:11b-instruct-q4_K_M
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: llama3.2-vision:11b-instruct-q4_K_M
    capabilities: [chat, vision]
    vram_budget_gb: 8
    concurrency: 2
    max_model_len: 8192
    profile: ollama
    recommended_for: [chat, vision]    # Phase 20 / CDX-01 — vision-capable chat; no tools/json_mode

  # Phase 7 (Plan 07-03) — vLLM chat model with AWQ Marlin quant + native tool calling.
  - name: qwen2.5-7b-instruct-awq
    backend: vllm
    backend_url: http://vllm:8000/v1
    backend_model: Qwen/Qwen2.5-7B-Instruct-AWQ
    capabilities: [chat, tools, json_mode]
    vram_budget_gb: 7.2
    concurrency: 2
    max_model_len: 8192
    profile: vllm
    disabled: true  # Phase 20 / CAT-01 / D-01 — backend not running on this host (project_vram_budget: vllm/llamacpp redundantes). Flip to false + start backend to re-enable.

  # Phase 7 (Plan 07-03) — bge-m3 embeddings served by Ollama (1024-dim, multilingual).
  # Phase 12 (EMB-H02): dims declared so the route can refuse mismatched vectors.
  - name: bge-m3-ollama
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: bge-m3
    capabilities: [embeddings]
    dims: 1024
    vram_budget_gb: 2.5
    concurrency: 4
    max_model_len: 8192
    profile: ollama
    recommended_for: [embeddings]    # Phase 20 / CDX-01 — pure embedding model

  # Phase 7 (Plan 07-03) — bge-m3 embeddings served by vLLM (cross-validates dispatch
  # heterogeneity at the dimensions level — same model, different backend).
  - name: bge-m3-vllm
    backend: vllm-embed
    backend_url: http://vllm-embed:8000/v1
    backend_model: BAAI/bge-m3
    capabilities: [embeddings]
    dims: 1024
    vram_budget_gb: 2.5
    concurrency: 4
    max_model_len: 8192
    profile: vllm
    disabled: true  # Phase 20 / CAT-01 / D-01 — backend not running on this host (project_vram_budget: vllm/llamacpp redundantes). Flip to false + start backend to re-enable.

  # Phase 8 (Plan 08-02 — CLOUD-01, CLOUD-02). Ollama Cloud entries route to
  # https://ollama.com/v1 with bearer OLLAMA_API_KEY from .env. vram_budget_gb=0
  # because cloud doesn't consume local VRAM; the registry envelope superRefine
  # sums them (0+0=0 ≤ 16). Concurrency: 4 — cloud's own rate-limit and quota
  # gates are the real cap; the per-backend semaphore backstops bursts.
  # Phase 13 (v0.10.0 — COST-01): pricing is USD per 1M tokens. Operator should
  # update these whenever Ollama publishes formal per-model pricing — placeholder
  # values here are deliberately conservative (lean toward the higher end seen
  # in public docs of comparable hosted models) so cost dashboards err on the
  # side of "this costs more than nothing" rather than silently reporting zero.
  - name: gpt-oss:120b-cloud
    backend: ollama-cloud
    backend_url: https://ollama.com/v1
    backend_model: gpt-oss:120b-cloud
    capabilities: [chat, tools, json_mode]
    pricing:
      input_per_1m: 0.50
      output_per_1m: 1.50
    vram_budget_gb: 0
    concurrency: 4
    max_model_len: 65536
    profile: cloud
    recommended_for: [chat, chat-tools, chat-json-strict, function-calling]    # Phase 20 / CDX-01 — large cloud chat workhorse with tools + json_mode

  - name: gpt-oss:20b-cloud
    backend: ollama-cloud
    backend_url: https://ollama.com/v1
    backend_model: gpt-oss:20b-cloud
    capabilities: [chat, tools, json_mode]
    pricing:
      input_per_1m: 0.10
      output_per_1m: 0.30
    vram_budget_gb: 0
    concurrency: 4
    max_model_len: 32768
    profile: cloud
    recommended_for: [chat, chat-tools, chat-json-strict, function-calling]    # Phase 20 / CDX-01 — cheaper cloud chat with tools + json_mode

  # ── Logical role aliases (260525-0hr) ──────────────────────────────────────
  # Stable role-based names so agents/n8n target a ROLE, not a model tag. These
  # are additional names over the canonical entries above — the registry maps by
  # `name`, so duplicate backend_model under a different name is fine.
  # vram_budget_gb: 0 — they are pointers to models already budgeted under their
  # canonical entry (or that Ollama swaps in/out at runtime); 0 keeps them from
  # double-counting against the per-backend VRAM envelope (registry.ts
  # superRefine sums vram_budget_gb per backend, must stay ≤ VRAM_ENVELOPE_GB).
  - name: chat-local
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: qwen2.5:7b-instruct-q4_K_M
    capabilities: [chat, tools, json_mode]
    vram_budget_gb: 0
    concurrency: 2
    max_model_len: 8192
    profile: ollama
    recommended_for: [chat, chat-tools, chat-json-strict, function-calling]    # Phase 20 / CDX-01 — workhorse local chat (qwen2.5:7b) with tools + json_mode
    # ── Phase 18 (v0.11.0 — MCPC-03 / RETR-02) per-entry fields (both optional) ──
    # Frame-01 invariant: production ships with these EMPTY. Operators opt-in by
    # uncommenting and providing implementations via the composition root.
    #
    # mcp_servers_enabled:                # aliases declared in top-level `mcp_servers:`
    #   - qdrant_retrieval                # cross-field validated at registry parse time
    #
    # pre_completion_hooks:               # name references to BuildAppOpts.preCompletionHooks Map
    #   - doc_retriever                   # NOT validated at parse time — buildApp checks at boot

  # Raw-name alias for the same qwen2.5:7b workhorse — added in Phase 20 (v0.12.0)
  # so consumers can pin the canonical model name explicitly instead of the role alias.
  # Both `chat-local` and `qwen2.5:7b-instruct-q4_K_M` resolve to the same Ollama backend
  # / backend_model; user-facing decision was D-02-style coexistence (no rename, no removal).
  - name: qwen2.5:7b-instruct-q4_K_M
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: qwen2.5:7b-instruct-q4_K_M
    capabilities: [chat, tools, json_mode]
    vram_budget_gb: 0    # pointer — VRAM already budgeted under chat-local
    concurrency: 2
    max_model_len: 8192
    profile: ollama
    recommended_for: [chat, chat-tools, chat-json-strict, function-calling]    # Phase 20 / CDX-01 — raw-name escape-hatch alias for the same qwen2.5:7b workhorse

  - name: vision-local
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: llama3.2-vision:11b-instruct-q4_K_M
    capabilities: [chat, vision]
    vram_budget_gb: 0
    concurrency: 2
    max_model_len: 8192
    profile: ollama
    recommended_for: [chat, vision]    # Phase 20 / CDX-01 — vision role alias (llama3.2-vision:11b)

  # Phase 11 (v0.10.0 — RERANK-03). Cross-encoder reranker. Ollama serves
  # bge-reranker-v2-m3 via native /api/rerank (the OllamaOpenAIAdapter.rerank
  # method trims /v1 and calls the native endpoint). vram_budget_gb=0 because
  # the model is loaded on-demand by Ollama (small footprint ~600MB, shares
  # VRAM with the chat workhorse via Ollama's swap policy).
  - name: bge-reranker-local
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: bge-reranker-v2-m3
    capabilities: [rerank]
    vram_budget_gb: 0
    concurrency: 4
    profile: ollama
    recommended_for: [rerank]    # Phase 20 / CDX-01 — cross-encoder reranker

  - name: embed-local
    backend: ollama
    backend_url: http://ollama:11434/v1
    backend_model: bge-m3
    capabilities: [embeddings]
    dims: 1024
    vram_budget_gb: 0
    concurrency: 4
    max_model_len: 8192
    profile: ollama
    recommended_for: [embeddings]    # Phase 20 / CDX-01 — local embedding role alias (bge-m3, 1024-dim)

  - name: big-cloud
    backend: ollama-cloud
    backend_url: https://ollama.com/v1
    backend_model: gpt-oss:120b-cloud
    capabilities: [chat, tools, json_mode]
    # Phase 13 (v0.10.0 — COST-01): alias mirrors the canonical gpt-oss:120b-cloud pricing.
    pricing:
      input_per_1m: 0.50
      output_per_1m: 1.50
    vram_budget_gb: 0
    concurrency: 4
    max_model_len: 65536
    profile: cloud
    recommended_for: [chat, chat-tools, chat-json-strict, function-calling]    # Phase 20 / CDX-01 — large cloud role alias (gpt-oss:120b)

# ─────────────────────────────────────────────────────────────────────────────
# CONSUMER RECOMMENDATIONS (Phase 20 — v0.12.0 — CDX-01 / D-05 LOCKED)
# ─────────────────────────────────────────────────────────────────────────────
#
# Programmatic answer to "which alias should I use for this use case on this
# stack?". Returned at the TOP LEVEL of GET /v1/models — consumers read this
# map to avoid hardcoding alias strings.
#
# Each value MUST be a non-disabled model `name` declared above. Cross-field
# validation at registry-parse time catches typos before boot
# (RegistrySchema.superRefine — see router/src/config/registry.ts).
#
# D-02 LOCKED convention: values point at SEMANTIC role aliases (chat-local,
# big-cloud, embed-local, vision-local, bge-reranker-local) NOT raw model
# names (qwen2.5:7b-instruct-q4_K_M, gpt-oss:20b-cloud) — the semantic alias
# is the consumer-facing canonical; raw names are escape-hatches for
# consumers that want to pin a specific model version. Both work as
# recommendation targets; the convention guides operators toward the role
# alias as the recommended path.
#
# Hot-reload: same Valkey-DEL + force-recreate recipe documented under POLICY
# PRIMITIVES above (project_models_yaml_hot_edit). Editing this block alone
# is a CONFIG change — no `docker compose build` needed; force-recreate is
# enough after the Valkey DEL.
#
# Naming convention: "<use-case>-<profile>-default" (profile ∈ {local, cloud}).
# When operators omit this block entirely, the router auto-derives the map
# from each entry's recommended_for tags (first matching enabled entry wins
# per (tag, profile) pair).
recommendations:
  chat-local-default: chat-local
  chat-cloud-default: big-cloud
  chat-json-strict-default: chat-local           # covers artiscrapper case (local + json_mode)
  chat-json-strict-cloud-default: big-cloud      # fallback when local is cold
  chat-tools-default: chat-local
  chat-tools-cloud-default: big-cloud
  embed-default: embed-local
  rerank-default: bge-reranker-local
  vision-default: vision-local
  function-calling-default: chat-local
# ─────────────────────────────────────────────────────────────────────────────
